<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نموذج منصة 4DPAL</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: rgba(16, 10, 7, 0.92);
        --panel-soft: rgba(255, 122, 42, 0.11);
        --text: #fff3e8;
        --muted: #cbb8aa;
        --accent: #ff7a2a;
        --line: rgba(255, 122, 42, 0.38);
        --shadow: rgba(255, 122, 42, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 78%, rgba(255, 122, 42, 0.2), transparent 30%),
          radial-gradient(circle at 86% 14%, rgba(255, 155, 61, 0.16), transparent 34%),
          linear-gradient(135deg, #030303, #160b05 54%, #030303);
        color: var(--text);
        font-family: Tahoma, Arial, sans-serif;
      }

      body::before {
        position: fixed;
        inset: -18%;
        z-index: 0;
        content: "";
        opacity: 0.11;
        background:
          repeating-linear-gradient(90deg, transparent 0 38px, rgba(255, 122, 42, 0.24) 39px 40px),
          repeating-linear-gradient(0deg, transparent 0 38px, rgba(255, 122, 42, 0.17) 39px 40px);
        transform: rotate(-7deg);
      }

      .shell {
        position: relative;
        z-index: 1;
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
        padding: 18px;
        gap: 14px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 14px 18px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(18px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .mark {
        display: grid;
        width: 58px;
        height: 58px;
        flex: 0 0 auto;
        place-items: center;
        border: 2px solid var(--accent);
        border-radius: 17px;
        color: var(--accent);
        font-size: 24px;
        font-weight: 900;
        box-shadow: 0 0 30px var(--shadow);
      }

      h1 {
        margin: 0;
        font-size: clamp(18px, 2.3vw, 30px);
        line-height: 1.35;
        white-space: nowrap;
      }

      .hint {
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 18px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--text);
        text-decoration: none;
        font-size: 15px;
        font-weight: 800;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }

      a:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
        background: var(--panel-soft);
      }

      .primary {
        background: var(--accent);
        color: #170b05;
        border-color: var(--accent);
        box-shadow: 0 0 26px var(--shadow);
      }

      .frame-wrap {
        position: relative;
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(0, 0, 0, 0.55);
        box-shadow: 0 26px 90px rgba(0, 0, 0, 0.36);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }

      .fallback {
        position: absolute;
        inset-inline: 26px;
        bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 12px 16px;
        border: 1px solid rgba(255, 122, 42, 0.24);
        border-radius: 999px;
        background: rgba(5, 5, 5, 0.72);
        color: var(--muted);
        font-size: 13px;
        backdrop-filter: blur(16px);
        pointer-events: none;
      }

      .fallback a {
        min-height: 34px;
        padding: 7px 13px;
        font-size: 13px;
        pointer-events: auto;
      }

      @media (max-width: 720px) {
        body {
          overflow: auto;
        }

        .shell {
          min-height: 100vh;
          height: auto;
          grid-template-rows: auto 74vh;
          padding: 12px;
        }

        header {
          align-items: stretch;
          flex-direction: column;
        }

        h1 {
          white-space: normal;
        }

        .actions {
          justify-content: stretch;
        }

        .actions a {
          flex: 1 1 160px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <div class="brand">
          <div class="mark">4D</div>
          <div>
            <h1>نموذج المنصة المقترحة 4DPAL</h1>
            <div class="hint">يمكن العودة إلى العرض من هذا الزر في أي لحظة.</div>
          </div>
        </div>

        <nav class="actions" aria-label="روابط التنقل">
          <a class="primary" href="../">العودة إلى العرض</a>
          <a id="openExternal" href="https://4dpal.netlify.app/" target="_blank" rel="noopener noreferrer">فتح المنصة في تبويب مستقل</a>
        </nav>
      </header>

      <main class="frame-wrap">
        <iframe
          src="https://4dpal.netlify.app/"
          title="نموذج منصة 4DPAL"
          loading="eager"
          referrerpolicy="no-referrer-when-downgrade"
          allow="fullscreen"
        ></iframe>
        <div class="fallback">
          إذا لم تظهر المنصة داخل الإطار، استخدم زر الفتح في تبويب مستقل ثم عد إلى العرض من هذا الشريط.
          <a href="../">عودة للعرض</a>
        </div>
      </main>
    </div>
  </body>
</html>
